<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>RASENGAN AR FIXED</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
}

#camera{
position:fixed;
top:0;left:0;
width:100%;height:100%;
object-fit:cover;
transform:scaleX(-1);
z-index:1;
}

#canvas{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:2;
pointer-events:none;
}

#startScreen{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:radial-gradient(circle,rgba(0,120,255,.2),black 70%);
z-index:999;
}

#title{font-size:45px;color:#7ad7ff;text-shadow:0 0 20px #00aaff;}
#startBtn{
margin-top:30px;
padding:15px 40px;
font-size:18px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#005eff,#00c8ff);
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<div id="startScreen">
<div id="title">RASENGAN</div>
<button id="startBtn">START ⚡</button>
</div>

<video id="camera" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

const cameraVideo = document.getElementById("camera");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const startBtn = document.getElementById("startBtn");
const startScreen = document.getElementById("startScreen");

let handX=0, handY=0, handDetected=false;
let particles=[];

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

// BACK CAMERA FIXED START
startBtn.onclick = async ()=>{

try{

const stream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:{ ideal:"environment" }   // ✅ BACK CAMERA FIX
},
audio:false
});

cameraVideo.srcObject = stream;
await cameraVideo.play();

startScreen.style.display="none";

initHands();

}catch(e){
alert("Camera permission denied / not supported");
console.log(e);
}

};

// ================= HANDS =================
let hands;

function initHands(){

hands = new Hands({
locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
});

hands.onResults(onResults);

// renamed camera (IMPORTANT FIX)
const mpCamera = new Camera(cameraVideo,{
onFrame:async()=>{
await hands.send({image:cameraVideo});
},
width:1280,
height:720
});

mpCamera.start();
requestAnimationFrame(loop);
}

function onResults(results){

handDetected=false;

if(results.multiHandLandmarks?.length){

const hand = results.multiHandLandmarks[0];
const palm = hand[9];

handX = canvas.width - palm.x * canvas.width;
handY = palm.y * canvas.height;

handDetected=true;
}
}

// ================= PARTICLES =================
function createParticle(x,y){
particles.push({
x,y,
vx:(Math.random()-0.5)*4,
vy:(Math.random()-0.5)*4,
life:60,
size:Math.random()*4+2
});
}

function updateParticles(){

for(let i=particles.length-1;i>=0;i--){
let p=particles[i];

p.x+=p.vx;
p.y+=p.vy;
p.life--;

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fillStyle=`rgba(100,200,255,${p.life/60})`;
ctx.fill();

if(p.life<=0)particles.splice(i,1);
}
}

// ================= RASENGAN =================
function drawRasengan(){

let t=Date.now()*0.01;

// glow rings
for(let i=6;i>0;i--){
ctx.beginPath();
ctx.arc(handX,handY,55+i*10,0,Math.PI*2);
ctx.strokeStyle=`rgba(0,180,255,${0.05*i})`;
ctx.lineWidth=6;
ctx.stroke();
}

// core
let g=ctx.createRadialGradient(handX,handY,5,handX,handY,60);
g.addColorStop(0,"#fff");
g.addColorStop(0.3,"#8de7ff");
g.addColorStop(1,"#009dff");

ctx.beginPath();
ctx.arc(handX,handY,55,0,Math.PI*2);
ctx.fillStyle=g;
ctx.fill();

// rings
for(let r=0;r<3;r++){
ctx.save();
ctx.translate(handX,handY);
ctx.rotate(t*0.03+r);

ctx.beginPath();
ctx.ellipse(0,0,70+r*8,30+r*4,0,0,Math.PI*2);
ctx.strokeStyle="rgba(120,220,255,.7)";
ctx.stroke();
ctx.restore();
}
}

// ================= MAIN LOOP =================
function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(handDetected){
for(let i=0;i<3;i++){
createParticle(handX,handY);
}
drawRasengan();
}

updateParticles();
requestAnimationFrame(loop);
}

</script>

</body>
</html>
