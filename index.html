<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rasengan AR</title>
<style>
html,body{margin:0;background:#000;overflow:hidden}
video,canvas{position:fixed;inset:0;width:100%;height:100%;object-fit:cover}
#start{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);padding:16px 28px;font-size:20px;z-index:10}
</style>
</head>
<body>
<button id="start">Start Jutsu ⚡</button>
<video id="cam" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const cam=document.getElementById('cam');
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let handPos=null;

function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize();
window.addEventListener('resize',resize);

document.getElementById('start').onclick=async()=>{
 const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
 cam.srcObject=stream;
 document.getElementById('start').remove();

 const hands=new Hands({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
 hands.setOptions({maxNumHands:1,minDetectionConfidence:0.7,minTrackingConfidence:0.7});

 hands.onResults((r)=>{
   if(r.multiHandLandmarks && r.multiHandLandmarks.length){
     const p=r.multiHandLandmarks[0][9];
     handPos={x:p.x*canvas.width,y:p.y*canvas.height};
   }
 });

 const camera=new Camera(cam,{
   onFrame:async()=>{await hands.send({image:cam});},
   width:1280,height:720
 });
 camera.start();
 requestAnimationFrame(loop);
};

function drawRasengan(x,y){
 for(let i=6;i>0;i--){
   ctx.beginPath();
   ctx.arc(x,y,25+i*8,0,Math.PI*2);
   ctx.strokeStyle=`rgba(80,180,255,${0.12*i})`;
   ctx.lineWidth=4;
   ctx.stroke();
 }
 ctx.beginPath();
 ctx.arc(x,y,40,0,Math.PI*2);
 ctx.fillStyle='rgba(120,200,255,.85)';
 ctx.fill();
}

function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 if(handPos) drawRasengan(handPos.x,handPos.y);
 requestAnimationFrame(loop);
}
</script>
</body></html>
